name: 🐞 Bug 报告
description: 报告一个 bug 来帮助我们改进项目
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告这个 bug！
  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你当前正在使用的软件版本号是？
      placeholder: "例如：v1.0.0"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请详细描述如何复现这个问题。
      placeholder: |
        1. 点击 '...'
        2. 向下滚动到 '...'
        3. 查看错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你原本预期会发生什么？
  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      description: 你在什么环境下遇到的问题？
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
